<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .font1 {
        font-family: "Courier New", Courier, monospace;
      }

      .font2 {
        font-family: Arial, Helvetica, sans-serif;
      }

      .italic {
        font-style: italic;
      }

      .oblique {
        font-style: oblique;
      }
    </style>
  </head>
  <body>
    <!-- 글꼴 스타일링 -->
    <!-- <h1 style="font-family: verdana">verdane 폰트</h1>
    <h1 style="font-family: courier">courier 폰트</h1>
    <h1 class="font1">
      현재 브라우저에 Courier New 폰트가 있다면, Courier New가 적용되고, 없다면,
      Courier가 적용되고, 이것도 없다면 각 브라우저가 가지고 있는 monospace
      폰트가 적용
    </h1> -->
    <!-- 폰트 스타일 -->
    <!-- <h1 class="font2">Arial > Helvetica > sans-serif</h1>
    <h1 class="italic">이텔릭체로 보여집니다.</h1>
    <h1 class="oblique">기본 글씨가 기울여져 보여집니다.</h1> -->

    <!-- 폰트 굵기 -->
     <!-- normal: 보통 폰트, 숫자값 400과 동일 -->
     <p style="font-weight: normal;"> font-weight:normal</p>
     <p style="font-weight: 400"> font-weight:400</p>
     <!-- bold: 굵은 폰트, 숫자값 700과 동일 -->
     <p style="font-weight: bold"> font-weight:bold</p>
     <p style="font-weight: 700"> font-weight:700</p>
     <!-- bolder : 상대적인 값 -->
      <div style="font-weight: 100">
        <p style="font-weight: bolder;">부모가 100일때, bolder는 400</p>
      </div>

      <div style="font-weight: 200">
        <p style="font-weight: bolder;">부모가 200일때, bolder는 400</p>
      </div>

      <div style="font-weight: 400">
        <p style="font-weight: bolder;">부모가 400일때, bolder는 700</p>
      </div>

      <div style="font-weight: 600">
        <p style="font-weight: bolder;">부모가 600이상 일때, bolder는 900</p>
      </div>

  </body>
</html>
