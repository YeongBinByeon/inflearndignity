<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul.square{
            list-style-type: square;
        }
        ul.astar{
            list-style-type: "*";
        }
        ol.decimal{
            list-style-type: decimal;
        }
        ol.lower-roman{
            list-style-type: lower-roman;
        }
        ol.lower-greek{
            list-style-type: lower-greek;
        }
    </style>
</head>
<body>
    <ul class="square">
        <li>에스프레소</li>
        <li>아메리카노</li>
        <li>카페라떼</li>
    </ul>
    <ul class="astar">
        <li>에스프레소</li>
        <li>아메리카노</li>
        <li>카페라떼</li>
    </ul>
    <ol class="decimal">
        <li>Node.js 설치</li>
        <li>vscode 설치</li>
        <li>확장프로그램 설치</li>
    </ol>
    <ol class="lower-roman">
        <li>Node.js 설치</li>
        <li>vscode 설치</li>
        <li>확장프로그램 설치</li>
    </ol>
    <ol class="lower-greek">
        <li>Node.js 설치</li>
        <li>vscode 설치</li>
        <li>확장프로그램 설치</li>
    </ol>
</body>
</html>
