<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <!-- CSS 색상 적용 -->
    <!-- 1. 색상명에 해당하는 키워드 사용 -->
    <h1 style="background-color: blue">파란색 배경색 적용</h1>
    <p style="color: orange">오렌지색 글씨 적용</p>

    <!-- 2. 색상값 사용 -->
    <!-- RGB 값 -->
    <h1 style="color: rgb(255, 0, 0)">빨간색</h1>
    <h1 style="color: rgb(0, 255, 0)">초록색</h1>
    <h1 style="color: rgb(0, 0, 255)">파란색</h1>
    <h1 style="color: rgb(191, 161, 48)">어떤색</h1>
    <h1 style="color: rgb(0, 0, 0)">어떤색</h1>
    <h1 style="color: rgb(255, 255, 255)">어떤색</h1>

    <!-- RGBA -->
    <!-- A-Alpha(투명도) -->
    <h1 style="color: rgba(255, 0, 0, 0.2)">빨간색</h1>

    <!-- 3. HEX 색상값 -->
    <!-- 16진수 표기법, 광원인 Red, Green, Blue의 조합으로 표기 -->
    <!-- 0 -> '00', 255 ->'FF' -->
    <h1 style="color: #ff0000">빨간색</h1>
    <h1 style="color: #00ff00">초록색</h1>
    <h1 style="color: #0000ff">파랑색</h1>
    <h1 style="color: #000000">검은색</h1>

    <!-- 4. HSL 값 -->
    <!-- 색조(hue), 채도, 밝기 3가지 값으로 구성 -->
  </body>
</html>
